<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FraudShield AI | High-Fidelity Monitoring</title>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.0.94/build/spline-viewer.js"></script>

  <style>
    :root {
      --primary: #6366f1;
      --success: #22c55e;
      --danger: #ef4444;
      --bg-dark: #020617;
      --glass-bg: rgba(15, 23, 42, 0.75);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-dark);
      color: #fff;
      min-height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* --- SPLINE BACKGROUND --- */
    #spline-container {
      position: fixed;
      top: 0;
      right: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
      pointer-events: none;
      transition: filter 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* --- MAIN PANEL --- */
    .main-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 1200px;
      padding: 40px;
      display: flex;
      align-items: center;
    }

    .glass-card {
      backdrop-filter: blur(30px);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 40px;
      padding: 45px;
      width: 480px;
      box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.8);
      position: relative;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -1.5px;
      margin-bottom: 5px;
      background: linear-gradient(to bottom, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 30px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 12px var(--success);
    }

    /* --- FORM --- */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .col-span {
      grid-column: span 2;
    }

    .input-box {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 0.75rem;
      color: #94a3b8;
      font-weight: 600;
      text-transform: uppercase;
    }

    input,
    select {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--glass-border);
      color: white;
      padding: 14px;
      border-radius: 14px;
      font-size: 0.95rem;
      transition: all 0.3s;
    }

    input:focus {
      border-color: var(--primary);
      outline: none;
      background: rgba(0, 0, 0, 0.6);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    /* --- HIGH-FIDELITY METAL BUTTON --- */
    .metal-btn-wrapper {
      position: relative;
      background: linear-gradient(180deg, #917100, #EAD98F);
      /* Gold Variant */
      padding: 1.25px;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 15px;
      transition: all 0.25s cubic-bezier(0.1, 0.4, 0.2, 1);
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.5);
    }

    .metal-btn-inner {
      position: relative;
      background: linear-gradient(180deg, #FFFDDD 0%, #856807 50%, #FFF1B3 100%);
      border-radius: 11px;
      padding: 1px;
    }

    .metal-btn {
      position: relative;
      background: linear-gradient(180deg, #FFEBA1, #9B873F);
      height: 56px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #FFFDE5;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      text-shadow: 0 -1px 0 rgb(178 140 2);
      overflow: hidden;
    }

    .metal-btn-wrapper:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
    }

    .metal-btn-wrapper:active {
      transform: translateY(1px);
      scale: 0.98;
    }

    .shine-effect {
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      transition: 0.6s;
    }

    .metal-btn-wrapper:hover .shine-effect {
      left: 150%;
    }

    /* --- RESULTS UI --- */
    #result {
      margin-top: 25px;
      border-radius: 24px;
      display: none;
      overflow: hidden;
      animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
    }

    .res-content {
      padding: 25px;
      border: 1px solid var(--glass-border);
    }

    .fraud-bg {
      background: rgba(239, 68, 68, 0.15);
      border-color: var(--danger);
    }

    .safe-bg {
      background: rgba(34, 197, 94, 0.15);
      border-color: var(--success);
    }
  </style>
</head>

<body>

  <!-- BACKGROUND ROBOT -->
  <div id="spline-container">
    <spline-viewer id="robot" url="https://prod.spline.design/i9VvT8fsh5N1lA4P/scene.splinecode"></spline-viewer>
  </div>

  <div class="main-wrapper">
    <div class="glass-card">
      <header>
        <h1>FraudShield AI</h1>
        <div class="status-badge">
          <div class="dot" id="dot"></div>
          <span id="api-status">Initialisation...</span>
        </div>
      </header>

      <form id="fraudForm" class="form-grid" onsubmit="event.preventDefault(); predict();">
        <div class="input-box">
          <label>Montant ($)</label>
          <input type="number" step="0.01" id="Amount" value="250.00" required>
        </div>
        <div class="input-box">
          <label>Date & Heure</label>
          <input type="datetime-local" id="Transaction_Date" required>
        </div>
        <div class="input-box col-span">
          <label>Marchand</label>
          <select id="Merchant_Category">
            <option value="Retail">Commerce de détail</option>
            <option value="Online Store">Boutique en ligne</option>
            <option value="Travel">Voyages & Transport</option>
            <option value="Entertainment">Divertissement</option>
          </select>
        </div>
        <div class="input-box">
          <label>Distance Home</label>
          <input type="number" id="Distance_From_Home" value="0.8">
        </div>
        <div class="input-box">
          <label>PIN Utilisé</label>
          <select id="Is_Pin_Used">
            <option value="1">Oui (PIN)</option>
            <option value="0">Non (Sans contact)</option>
          </select>
        </div>

        <input type="hidden" id="Card_Type" value="Visa">
        <input type="hidden" id="Transaction_Type" value="POS">
        <input type="hidden" id="Country" value="France">
        <input type="hidden" id="Device_Type" value="Mobile">
        <input type="hidden" id="Is_International" value="0">
        <input type="hidden" id="Is_Chip" value="1">

        <div class="col-span">
          <div class="metal-btn-wrapper" onclick="document.getElementById('fraudForm').requestSubmit();">
            <div class="metal-btn-inner">
              <div class="metal-btn">
                <div class="shine-effect"></div>
                <span id="btn-text">Lancer l'analyse</span>
              </div>
            </div>
          </div>
        </div>
      </form>

      <div id="result"></div>
    </div>
  </div>

  <script>
    const now = new Date();
    document.getElementById('Transaction_Date').value = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0, 16);

    async function checkHealth() {
      const status = document.getElementById('api-status');
      const dot = document.getElementById('dot');
      try {
        const r = await fetch('/health');
        const d = await r.json();
        status.innerText = `SYSTÈME ACTIF (${d.version})`;
        dot.style.background = 'var(--success)';
      } catch (e) {
        status.innerText = `SERVEUR DÉCONNECTÉ`;
        dot.style.background = 'var(--danger)';
      }
    }

    async function predict() {
      const btn = document.getElementById('btn-text');
      const robot = document.getElementById('robot');
      const resDiv = document.getElementById('result');

      btn.innerText = 'CALCUL...';
      const dateVal = document.getElementById('Transaction_Date').value;
      const amount = document.getElementById('Amount').value;
      const cat = document.getElementById('Merchant_Category').options[document.getElementById('Merchant_Category').selectedIndex].text;

      const payload = {
        Amount: parseFloat(amount),
        Transaction_Date: dateVal.replace('T', ' ') + ':00',
        Merchant_Category: document.getElementById('Merchant_Category').value,
        Card_Type: document.getElementById('Card_Type').value,
        Transaction_Type: document.getElementById('Transaction_Type').value,
        Country: document.getElementById('Country').value,
        Device_Type: document.getElementById('Device_Type').value,
        Is_International: parseInt(document.getElementById('Is_International').value),
        Is_Chip: parseInt(document.getElementById('Is_Chip').value),
        Is_Pin_Used: parseInt(document.getElementById('Is_Pin_Used').value),
        Distance_From_Home: parseFloat(document.getElementById('Distance_From_Home').value),
        Hour_of_Day: new Date(dateVal).getHours()
      };

      try {
        const response = await fetch('/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await response.json();
        const proba = (data.probability * 100).toFixed(2);
        const confidence = (100 - (data.probability * 100)).toFixed(2);

        resDiv.style.display = 'block';

        if (data.prediction === 1) {
          robot.style.filter = 'hue-rotate(280deg) saturate(2.5) contrast(1.2) drop-shadow(0 0 40px red)';
          resDiv.innerHTML = `
            <div class="res-content fraud-bg">
              <h3 style="color:var(--danger)">🚨 ${data.message}</h3>
              <p style="font-size:0.85rem; color:#94a3b8; margin: 10px 0;">Paiement de ${amount}$ en ${cat} suspecté.</p>
              <div style="background:rgba(239,68,68,0.1); padding:12px; border-radius:12px; font-weight:700; color:var(--danger)">Risque : ${proba}%</div>
              <p style="font-size:0.65rem; color:#64748b; margin-top:10px;">Modèle : ${data.version}</p>
            </div>
          `;
        } else {
          robot.style.filter = 'none';
          resDiv.innerHTML = `
            <div class="res-content safe-bg">
              <h3 style="color:var(--success)">✅ ${data.message}</h3>
              <p style="font-size:0.85rem; color:#94a3b8; margin: 10px 0;">Transaction de ${amount}$ validée avec succès.</p>
              <div style="background:rgba(34,197,94,0.1); padding:12px; border-radius:12px; font-weight:700; color:var(--success)">Confiance : ${confidence}%</div>
              <p style="font-size:0.65rem; color:#64748b; margin-top:10px;">Modèle : ${data.version}</p>
            </div>
          `;
        }
      } catch (e) {
        alert("Erreur de connexion.");
      }
      btn.innerText = "LANCER L'ANALYSE";
    }

    checkHealth();
  </script>
</body>

</html>
