<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FraudShield AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.0.94/build/spline-viewer.js"></script>

  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── CARD ── */
    .card {
      position: relative;
      width: min(96vw, 1100px);
      height: min(92vh, 620px);
      background: rgba(0, 0, 0, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      overflow: hidden;
      display: flex;
      transition: border-color 0.7s, box-shadow 0.7s;
    }

    /* ── SPOTLIGHT ── */
    .spotlight {
      pointer-events: none;
      position: absolute;
      z-index: 0;
      background: radial-gradient(ellipse 60% 55% at 35% -10%,
          rgba(255, 255, 255, 0.18) 0%, rgba(255, 255, 255, 0.06) 40%, transparent 70%);
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }

    /* ── LEFT PANEL ── */
    .left {
      flex: 0 0 48%;
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 48px 44px;
    }

    .left h1 {
      font-size: clamp(1.8rem, 3vw, 2.7rem);
      font-weight: 800;
      letter-spacing: -1.5px;
      background: linear-gradient(to bottom, #f5f5f5 0%, #a3a3a3 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #a3a3a3;
      line-height: 1.6;
      margin-bottom: 22px;
      max-width: 300px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.65rem;
      font-weight: 700;
      color: #525252;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 18px;
    }

    .sdot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
      transition: background 0.5s, box-shadow 0.5s;
    }

    /* Form */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .full {
      grid-column: span 2;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field label {
      font-size: 0.6rem;
      font-weight: 700;
      color: #525252;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    input,
    select {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #e5e5e5;
      padding: 9px 11px;
      border-radius: 10px;
      font-size: 0.84rem;
      font-family: inherit;
      width: 100%;
      transition: border-color 0.2s;
    }

    input:focus,
    select:focus {
      border-color: rgba(255, 255, 255, 0.3);
      outline: none;
    }

    select option {
      background: #111;
    }

    /* Metal Button */
    .metal-outer {
      margin-top: 12px;
      padding: 1.5px;
      border-radius: 12px;
      background: linear-gradient(180deg, #917100, #EAD98F);
      cursor: pointer;
      box-shadow: 0 5px 18px rgba(0, 0, 0, 0.7);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .metal-outer:hover {
      transform: translateY(-2px);
    }

    .metal-outer:active {
      transform: translateY(1px);
      scale: 0.99;
    }

    .metal-mid {
      background: linear-gradient(180deg, #FFFDDD 0%, #856807 50%, #FFF1B3 100%);
      border-radius: 11px;
      padding: 1px;
    }

    .metal-inner {
      background: linear-gradient(180deg, #FFEBA1, #9B873F);
      border-radius: 10px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #FFFDE5;
      text-shadow: 0 -1px 0 rgba(0, 0, 0, 0.4);
      position: relative;
      overflow: hidden;
    }

    .shine {
      position: absolute;
      top: 0;
      left: -100%;
      width: 45%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: 0.55s;
    }

    .metal-outer:hover .shine {
      left: 160%;
    }

    /* Result */
    #result {
      margin-top: 12px;
      display: none;
      animation: rpop 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    @keyframes rpop {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
    }

    .ri {
      padding: 13px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .ri h3 {
      font-size: 0.85rem;
      margin-bottom: 5px;
    }

    .ri p {
      font-size: 0.74rem;
      color: #737373;
      margin-bottom: 8px;
    }

    .score {
      padding: 8px 12px;
      border-radius: 9px;
      font-weight: 700;
      font-size: 0.82rem;
    }

    .meta {
      font-size: 0.6rem;
      color: #404040;
      margin-top: 8px;
    }

    .fraud-th {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.35);
    }

    .safe-th {
      background: rgba(34, 197, 94, 0.1);
      border-color: rgba(34, 197, 94, 0.35);
    }

    /* ── RIGHT : Spline container ──
       Le filter CSS s'applique ICI sur le wrapper, pas sur spline-viewer,
       ce qui permet de traverser le Shadow DOM visuellement              */
    .right {
      flex: 1;
      position: relative;
      overflow: hidden;
      transition: filter 0.75s cubic-bezier(0.4, 0, 0.2, 1);
    }

    spline-viewer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* Overlay coloré sur le robot — z-index > spline */
    #overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.7s ease, background 0.7s ease;
    }

    /* Loader */
    .loader {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Animations de pulsation pour la carte */
    @keyframes fraudGlow {

      0%,
      100% {
        box-shadow: 0 0 0 1px rgba(239, 68, 68, 0.3), 0 0 40px rgba(239, 68, 68, 0.15);
      }

      50% {
        box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.6), 0 0 80px rgba(239, 68, 68, 0.3);
      }
    }

    @keyframes safeGlow {

      0%,
      100% {
        box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.3), 0 0 40px rgba(34, 197, 94, 0.1);
      }

      50% {
        box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.5), 0 0 70px rgba(34, 197, 94, 0.25);
      }
    }
  </style>
</head>

<body>

  <div class="card" id="card">
    <div class="spotlight" id="spotlight"></div>

    <!-- LEFT -->
    <div class="left">
      <h1>FraudShield AI</h1>
      <p class="subtitle">Détection de fraude bancaire en temps réel,<br>propulsée par XGBoost.</p>

      <div class="status-row">
        <div class="sdot" id="dot"></div>
        <span id="api-status">Connexion…</span>
      </div>

      <form id="form" class="grid" onsubmit="event.preventDefault(); predict();">
        <div class="field">
          <label>Montant ($)</label>
          <input type="number" step="0.01" id="Amount" value="250.00" required>
        </div>
        <div class="field">
          <label>Date & Heure</label>
          <input type="datetime-local" id="Transaction_Date" required>
        </div>
        <div class="field full">
          <label>Catégorie Marchand</label>
          <select id="Merchant_Category">
            <option value="Retail">Commerce de détail</option>
            <option value="Online Store">Boutique en ligne</option>
            <option value="Travel">Voyages & Transport</option>
            <option value="Entertainment">Divertissement</option>
          </select>
        </div>
        <div class="field">
          <label>Distance (km)</label>
          <input type="number" step="0.1" id="Distance_From_Home" value="0.8">
        </div>
        <div class="field">
          <label>PIN Utilisé</label>
          <select id="Is_Pin_Used">
            <option value="1">Oui</option>
            <option value="0">Non</option>
          </select>
        </div>

        <input type="hidden" id="Card_Type" value="Visa">
        <input type="hidden" id="Transaction_Type" value="POS">
        <input type="hidden" id="Country" value="France">
        <input type="hidden" id="Device_Type" value="Mobile">
        <input type="hidden" id="Is_International" value="0">
        <input type="hidden" id="Is_Chip" value="1">

        <div class="full">
          <div class="metal-outer" onclick="document.getElementById('form').requestSubmit()">
            <div class="metal-mid">
              <div class="metal-inner">
                <div class="shine"></div>
                <span id="btn-text">Lancer l'analyse</span>
              </div>
            </div>
          </div>
        </div>
      </form>

      <div id="result"></div>
    </div>

    <!-- RIGHT : Spline -->
    <div class="right" id="right-container">
      <div class="loader" id="loader">
        <div class="spinner"></div>
      </div>
      <div id="overlay"></div>
      <!-- Cache le badge "Built with Spline" injecté dans le shadow DOM -->
      <div
        style="position:absolute;bottom:0;right:0;width:200px;height:44px;background:#000;z-index:20;pointer-events:none;">
      </div>
      <spline-viewer id="robot" url="https://prod.spline.design/kZDDjO5HuC9GJUM2/scene.splinecode"></spline-viewer>
    </div>
  </div>

  <script>
    // Init datetime
    const n = new Date();
    document.getElementById('Transaction_Date').value =
      new Date(n.getTime() - n.getTimezoneOffset() * 60000).toISOString().slice(0, 16);

    // Cacher loader quand Spline est prêt
    document.getElementById('robot').addEventListener('load', () => {
      document.getElementById('loader').style.display = 'none';
    });

    // Spotlight dynamique
    document.getElementById('card').addEventListener('mousemove', (e) => {
      const r = e.currentTarget.getBoundingClientRect();
      const x = ((e.clientX - r.left) / r.width * 100).toFixed(1);
      const y = ((e.clientY - r.top) / r.height * 100).toFixed(1);
      document.getElementById('spotlight').style.background =
        `radial-gradient(ellipse 55% 50% at ${x}% ${y}%, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.05) 45%, transparent 70%)`;
    });

    // Health check
    async function checkHealth() {
      try {
        const d = await (await fetch('/health')).json();
        document.getElementById('dot').style.cssText = 'background:#22c55e;box-shadow:0 0 8px #22c55e';
        document.getElementById('api-status').innerText = `ACTIF — ${d.version || '—'}`;
      } catch {
        document.getElementById('dot').style.cssText = 'background:#ef4444;box-shadow:0 0 8px #ef4444';
        document.getElementById('api-status').innerText = 'DÉCONNECTÉ';
      }
    }
    checkHealth();

    /*
     * setRobotState : applique le filtre sur le WRAPPER .right
     * CSS filter sur le conteneur parent traverse le rendu du shadow DOM
     * de spline-viewer — c'est la seule méthode qui fonctionne.
     */
    function setRobotState(state) {
      const container = document.getElementById('right-container');
      const overlay = document.getElementById('overlay');
      const card = document.getElementById('card');

      if (state === 'fraud') {
        /* Filtre sur le conteneur (pas sur spline-viewer directement) */
        container.style.filter = 'hue-rotate(300deg) saturate(3) brightness(0.8) contrast(1.2)';
        /* Overlay rouge radial par-dessus */
        overlay.style.cssText = 'opacity:1; background: radial-gradient(ellipse 80% 80% at 50% 50%, rgba(239,68,68,0.4) 0%, rgba(239,68,68,0.05) 70%);';
        /* Lueur rouge sur la bordure de la carte */
        card.style.borderColor = 'rgba(239,68,68,0.6)';
        card.style.animation = 'fraudGlow 1.6s ease-in-out infinite';
      } else if (state === 'safe') {
        container.style.filter = 'hue-rotate(120deg) saturate(2) brightness(1.05)';
        overlay.style.cssText = 'opacity:1; background: radial-gradient(ellipse 80% 80% at 50% 50%, rgba(34,197,94,0.3) 0%, rgba(34,197,94,0.04) 70%);';
        card.style.borderColor = 'rgba(34,197,94,0.5)';
        card.style.animation = 'safeGlow 1.6s ease-in-out infinite';
      } else {
        container.style.filter = 'none';
        overlay.style.opacity = '0';
        card.style.borderColor = 'rgba(255,255,255,0.08)';
        card.style.animation = 'none';
      }
    }

    // Prediction
    async function predict() {
      const btn = document.getElementById('btn-text');
      const resDiv = document.getElementById('result');
      const dateVal = document.getElementById('Transaction_Date').value;
      const amount = parseFloat(document.getElementById('Amount').value);
      const catEl = document.getElementById('Merchant_Category');
      const cat = catEl.options[catEl.selectedIndex].text;

      btn.innerText = 'ANALYSE…';
      setRobotState('idle');
      resDiv.style.display = 'none';

      const payload = {
        Amount: amount,
        Transaction_Date: dateVal.replace('T', ' ') + ':00',
        Merchant_Category: catEl.value,
        Card_Type: document.getElementById('Card_Type').value,
        Transaction_Type: document.getElementById('Transaction_Type').value,
        Country: document.getElementById('Country').value,
        Device_Type: document.getElementById('Device_Type').value,
        Is_International: parseInt(document.getElementById('Is_International').value),
        Is_Chip: parseInt(document.getElementById('Is_Chip').value),
        Is_Pin_Used: parseInt(document.getElementById('Is_Pin_Used').value),
        Distance_From_Home: parseFloat(document.getElementById('Distance_From_Home').value),
        Hour_of_Day: new Date(dateVal).getHours()
      };

      try {
        const data = await (await fetch('/predict', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        })).json();

        const pred = data.prediction ?? 0;
        const proba = typeof data.probability === 'number' ? data.probability : 0;
        const msg = (typeof data.message === 'string' && data.message.trim())
          ? data.message
          : (pred === 1 ? 'Activité suspecte détectée !' : 'La transaction semble légitime.');
        const ver = data.version ?? 'N/A';
        const risk = (proba * 100).toFixed(2);
        const conf = ((1 - proba) * 100).toFixed(2);

        resDiv.style.display = 'block';

        if (pred === 1) {
          setRobotState('fraud');
          resDiv.innerHTML = `
          <div class="ri fraud-th">
            <h3 style="color:#ef4444">🚨 ${msg}</h3>
            <p>Paiement de <b>${amount.toFixed(2)} $</b> — <b>${cat}</b></p>
            <div class="score" style="background:rgba(239,68,68,0.1);color:#ef4444">Risque : <b>${risk} %</b></div>
            <div class="meta">Modèle : ${ver}</div>
          </div>`;
        } else {
          setRobotState('safe');
          resDiv.innerHTML = `
          <div class="ri safe-th">
            <h3 style="color:#22c55e">✅ ${msg}</h3>
            <p>Paiement de <b>${amount.toFixed(2)} $</b> (${cat}) validé.</p>
            <div class="score" style="background:rgba(34,197,94,0.1);color:#22c55e">Confiance : <b>${conf} %</b></div>
            <div class="meta">Modèle : ${ver}</div>
          </div>`;
        }

      } catch {
        resDiv.style.display = 'block';
        resDiv.innerHTML = `
        <div class="ri" style="border-color:rgba(239,68,68,0.4);background:rgba(239,68,68,0.08)">
          <h3 style="color:#ef4444">❌ Erreur réseau</h3>
          <p>Impossible de joindre l'API.</p>
        </div>`;
      }
      btn.innerText = "LANCER L'ANALYSE";
    }
  </script>
</body>

</html>
