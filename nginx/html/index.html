<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FraudShield AI | Next-Gen Monitoring</title>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.0.94/build/spline-viewer.js"></script>

  <style>
    :root {
      --primary: #6366f1;
      --success: #22c55e;
      --danger: #ef4444;
      --bg-dark: #020617;
      --glass-bg: rgba(15, 23, 42, 0.7);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-dark);
      color: #fff;
      min-height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* --- BACKGROUND ROBOT --- */
    #spline-container {
      position: fixed;
      top: 0;
      right: 0;
      width: 65vw;
      height: 100vh;
      z-index: 1;
      pointer-events: none;
      transition: filter 0.5s ease;
    }

    /* --- SIDEBAR PANEL --- */
    .main-wrapper {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 500px;
      padding: 30px;
      background: linear-gradient(90deg, var(--bg-dark) 50%, transparent 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      backdrop-filter: blur(25px);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      padding: 35px;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 8px;
      background: linear-gradient(to right, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .badge-status {
      font-size: 0.7rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
      display: block;
    }

    /* --- FORM --- */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .col-span {
      grid-column: span 2;
    }

    .input-box {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 0.75rem;
      color: #94a3b8;
      font-weight: 600;
    }

    input,
    select {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--glass-border);
      color: white;
      padding: 12px;
      border-radius: 12px;
      font-size: 0.9rem;
      transition: 0.3s;
    }

    input:focus {
      border-color: var(--primary);
      outline: none;
    }

    /* --- METAL BUTTON --- */
    .metal-btn {
      position: relative;
      background: linear-gradient(180deg, #444, #000);
      padding: 1.5px;
      border-radius: 14px;
      cursor: pointer;
      margin-top: 10px;
      transition: transform 0.1s;
    }

    .metal-btn-inner {
      background: linear-gradient(180deg, #6366f1 0%, #4338ca 100%);
      border-radius: 13px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
    }

    .metal-btn:active {
      transform: translateY(2px);
    }

    .metal-btn:hover .shine {
      left: 150%;
    }

    .shine {
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: 0.6s;
    }

    /* --- RESULTS --- */
    #result {
      margin-top: 25px;
      padding: 20px;
      border-radius: 20px;
      display: none;
      border: 1px solid var(--glass-border);
    }

    .fraud-ui {
      background: rgba(239, 68, 68, 0.15);
      border-color: var(--danger);
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.1);
    }

    .safe-ui {
      background: rgba(34, 197, 94, 0.15);
      border-color: var(--success);
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.1);
    }
  </style>
</head>

<body>

  <div id="spline-container">
    <!-- Robot Spline -->
    <spline-viewer id="robot" url="https://prod.spline.design/kZqon7WkYAsmSpxW/scene.splinecode"></spline-viewer>
  </div>

  <div class="main-wrapper">
    <div class="container">
      <header>
        <h1>FraudShield AI</h1>
        <span class="badge-status" id="api-status">Initialisation...</span>
      </header>

      <form id="predictForm" class="form-grid" onsubmit="event.preventDefault(); predict();">
        <div class="input-box">
          <label>Montant ($)</label>
          <input type="number" step="0.01" id="Amount" value="150.00" required>
        </div>
        <div class="input-box">
          <label>Date Transaction</label>
          <input type="datetime-local" id="Transaction_Date" required>
        </div>
        <div class="input-box col-span">
          <label>Catégorie Marchand</label>
          <select id="Merchant_Category">
            <option value="Retail">Commerce de détail</option>
            <option value="Online Store">Boutique en ligne</option>
            <option value="Entertainment">Divertissement</option>
            <option value="Travel">Voyage</option>
          </select>
        </div>
        <div class="input-box">
          <label>PIN Utilisé</label>
          <select id="Is_Pin_Used">
            <option value="1">Oui</option>
            <option value="0">Non</option>
          </select>
        </div>
        <div class="input-box">
          <label>Distance (km)</label>
          <input type="number" id="Distance_From_Home" value="1.2">
        </div>

        <!-- Valeurs par défaut pour cohérence API -->
        <input type="hidden" id="Card_Type" value="Visa">
        <input type="hidden" id="Transaction_Type" value="POS">
        <input type="hidden" id="Country" value="France">
        <input type="hidden" id="Device_Type" value="Mobile">
        <input type="hidden" id="Is_International" value="0">
        <input type="hidden" id="Is_Chip" value="1">

        <div class="col-span">
          <div class="metal-btn" onclick="document.getElementById('predictForm').requestSubmit();">
            <div class="metal-btn-inner">
              <div class="shine"></div>
              <span id="btn-text">Lancer l'analyse</span>
            </div>
          </div>
        </div>
      </form>

      <div id="result"></div>
    </div>
  </div>

  <script>
    // Config Date
    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    document.getElementById('Transaction_Date').value = now.toISOString().slice(0, 16);

    async function checkHealth() {
      try {
        const r = await fetch('/health');
        const d = await r.json();
        document.getElementById('api-status').innerText = `● Système Connecté (v${d.version})`;
      } catch (e) {
        document.getElementById('api-status').innerText = `● Système Hors-ligne`;
      }
    }

    async function predict() {
      const btn = document.getElementById('btn-text');
      const robot = document.getElementById('robot');
      const resDiv = document.getElementById('result');

      btn.innerText = 'ANALYSE EN COURS...';
      const dateVal = document.getElementById('Transaction_Date').value;

      const payload = {
        Amount: parseFloat(document.getElementById('Amount').value),
        Transaction_Date: dateVal.replace('T', ' ') + ':00',
        Merchant_Category: document.getElementById('Merchant_Category').value,
        Card_Type: document.getElementById('Card_Type').value,
        Transaction_Type: document.getElementById('Transaction_Type').value,
        Country: document.getElementById('Country').value,
        Device_Type: document.getElementById('Device_Type').value,
        Is_International: parseInt(document.getElementById('Is_International').value),
        Is_Chip: parseInt(document.getElementById('Is_Chip').value),
        Is_Pin_Used: parseInt(document.getElementById('Is_Pin_Used').value),
        Distance_From_Home: parseFloat(document.getElementById('Distance_From_Home').value),
        Hour_of_Day: new Date(dateVal).getHours()
      };

      try {
        const response = await fetch('/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await response.json();
        resDiv.style.display = 'block';

        const proba = data.fraud_probability !== undefined ? (data.fraud_probability * 100).toFixed(2) : "0.00";
        const v = data.version || "N/A";

        if (data.prediction === 1) {
          robot.style.filter = 'hue-rotate(280deg) saturate(2) drop-shadow(0 0 50px red)';
          resDiv.className = 'fraud-ui';
          resDiv.innerHTML = `<h3 style="color:var(--danger)">🚨 FRAUDE DÉTECTÉE</h3>
                              <p style="font-size:0.9rem; margin-top:5px; color:#9dabbd">Risque : <b>${proba}%</b> | v${v}</p>`;
        } else {
          robot.style.filter = 'none';
          resDiv.className = 'safe-ui';
          resDiv.innerHTML = `<h3 style="color:var(--success)">✅ TRANSACTION SÉCURISÉE</h3>
                              <p style="font-size:0.9rem; margin-top:5px; color:#9dabbd">Confiance : <b>${(100 - proba).toFixed(2)}%</b> | v${v}</p>`;
        }
      } catch (e) {
        alert("Erreur de connexion API.");
      }
      btn.innerText = "LANCER L'ANALYSE";
    }

    checkHealth();
  </script>
</body>

</html>
