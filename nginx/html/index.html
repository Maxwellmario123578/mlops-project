<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FraudShield AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --success: #22c55e;
      --danger: #ef4444;
      --bg: #020617;
      --card: rgba(15, 23, 42, 0.88);
      --border: rgba(255, 255, 255, 0.1);
      --rc: #6366f1;
      /* robot color */
      --re: #a5b4fc;
      /* robot eye   */
      --rg: rgba(99, 102, 241, 0.35);
      /* robot glow */
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ── LOCK TO SCREEN ─────────────────────────── */
    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      /* NO SCROLL EVER */
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(circle at 75% 35%, rgba(99, 102, 241, 0.13) 0%, transparent 55%),
        radial-gradient(circle at 15% 80%, rgba(168, 85, 247, 0.08) 0%, transparent 45%);
      color: #fff;
    }

    /* ── FULL-PAGE GRID ─────────────────────────── */
    .page {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-columns: 460px 1fr;
      align-items: center;
      padding: 20px 40px;
      gap: 30px;
    }

    /* ── GLASS PANEL ────────────────────────────── */
    .panel {
      height: calc(100vh - 40px);
      max-height: 780px;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(28px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 28px 30px;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
      overflow: hidden;
    }

    /* Header */
    h1 {
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.65rem;
      font-weight: 700;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    .sdot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
      transition: background .4s, box-shadow .4s;
    }

    /* Form */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .full {
      grid-column: span 2;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field label {
      font-size: 0.62rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .8px;
    }

    input,
    select {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--border);
      color: #fff;
      padding: 9px 11px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-family: inherit;
      width: 100%;
      transition: border-color .2s, box-shadow .2s;
    }

    input:focus,
    select:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    select option {
      background: #1e293b;
    }

    /* Metal Button */
    .metal-outer {
      margin-top: 10px;
      padding: 1.5px;
      border-radius: 12px;
      background: linear-gradient(180deg, #917100, #EAD98F);
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.5);
      transition: transform .2s, box-shadow .2s;
    }

    .metal-outer:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.5);
    }

    .metal-outer:active {
      transform: translateY(1px);
      scale: 0.99;
    }

    .metal-mid {
      background: linear-gradient(180deg, #FFFDDD 0%, #856807 50%, #FFF1B3 100%);
      border-radius: 11px;
      padding: 1px;
    }

    .metal-inner {
      background: linear-gradient(180deg, #FFEBA1, #9B873F);
      border-radius: 10px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #FFFDE5;
      text-shadow: 0 -1px 0 rgba(0, 0, 0, 0.4);
      position: relative;
      overflow: hidden;
    }

    .shine {
      position: absolute;
      top: 0;
      left: -100%;
      width: 45%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.35), transparent);
      transition: .55s;
    }

    .metal-outer:hover .shine {
      left: 160%;
    }

    /* Result Block — compact, inline */
    #result {
      margin-top: 12px;
      flex-shrink: 0;
      border-radius: 16px;
      overflow: hidden;
      display: none;
      animation: pop .4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    @keyframes pop {
      from {
        opacity: 0;
        transform: scale(0.96);
      }
    }

    .ri {
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    .ri h3 {
      font-size: 0.88rem;
      margin-bottom: 5px;
    }

    .ri p {
      font-size: 0.75rem;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    .score-bar {
      padding: 9px 12px;
      border-radius: 9px;
      font-weight: 700;
      font-size: 0.82rem;
    }

    .meta {
      font-size: 0.6rem;
      color: #475569;
      margin-top: 8px;
    }

    .fraud-th {
      background: rgba(239, 68, 68, 0.12);
      border-color: #ef4444;
    }

    .safe-th {
      background: rgba(34, 197, 94, 0.12);
      border-color: #22c55e;
    }

    /* ── ROBOT AREA ─────────────────────────────── */
    .robot-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      height: 100%;
    }

    .robot-wrap {
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-12px)
      }
    }

    /* Antenna */
    .antenna {
      margin: 0 auto;
      width: 4px;
      height: 34px;
      background: var(--rc);
      border-radius: 4px;
      box-shadow: 0 0 12px var(--rg);
      position: relative;
    }

    .antenna::after {
      content: '';
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--re);
      box-shadow: 0 0 10px var(--re);
      animation: blink 2.5s infinite;
    }

    @keyframes blink {

      0%,
      88%,
      100% {
        opacity: 1
      }

      94% {
        opacity: 0
      }
    }

    /* Head */
    .head {
      width: 130px;
      height: 100px;
      background: linear-gradient(160deg, #1e293b, #0f172a);
      border: 2px solid var(--rc);
      border-radius: 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      box-shadow: 0 0 28px var(--rg), inset 0 1px 1px rgba(255, 255, 255, 0.05);
      transition: border-color .6s, box-shadow .6s;
    }

    .eyes {
      display: flex;
      gap: 18px;
    }

    .eye {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--re);
      box-shadow: 0 0 14px var(--re);
      animation: eyePulse 3s ease-in-out infinite;
      transition: background .6s, box-shadow .6s;
    }

    .eye:nth-child(2) {
      animation-delay: .5s;
    }

    @keyframes eyePulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 1
      }

      50% {
        transform: scale(.82);
        opacity: .6
      }
    }

    .mouth {
      width: 46px;
      height: 7px;
      background: var(--rc);
      border-radius: 4px;
      box-shadow: 0 0 8px var(--rg);
      transition: background .6s, box-shadow .6s;
    }

    /* Body */
    .body {
      width: 152px;
      height: 120px;
      background: linear-gradient(160deg, #1e293b, #0f172a);
      border: 2px solid var(--rc);
      border-radius: 18px;
      position: relative;
      margin-top: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 28px var(--rg);
      transition: border-color .6s, box-shadow .6s;
    }

    .arms {
      position: absolute;
      width: 210px;
      height: 120px;
      top: 0;
    }

    .arm {
      position: absolute;
      width: 20px;
      height: 82px;
      background: linear-gradient(180deg, #1e293b, #0f172a);
      border: 2px solid var(--rc);
      border-radius: 9px;
      top: 8px;
      box-shadow: 0 0 12px var(--rg);
      transition: border-color .6s, box-shadow .6s;
    }

    .arm.l {
      left: -8px;
    }

    .arm.r {
      right: -8px;
    }

    .chest {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--rc);
      box-shadow: 0 0 18px var(--rc), 0 0 36px var(--rc);
      animation: cpulse 2s ease-in-out infinite;
      transition: background .6s, box-shadow .6s;
    }

    @keyframes cpulse {

      0%,
      100% {
        transform: scale(1);
        opacity: .8
      }

      50% {
        transform: scale(1.15);
        opacity: 1
      }
    }

    .blines {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .bl {
      width: 18px;
      height: 2.5px;
      background: var(--rc);
      border-radius: 2px;
      opacity: .55;
      transition: background .6s;
    }

    /* Legs */
    .legs {
      display: flex;
      gap: 20px;
      margin-top: 5px;
    }

    .leg {
      width: 28px;
      height: 50px;
      background: linear-gradient(180deg, #1e293b, #0f172a);
      border: 2px solid var(--rc);
      border-radius: 9px;
      box-shadow: 0 0 12px var(--rg);
      animation: walk 2s ease-in-out infinite alternate;
      transition: border-color .6s, box-shadow .6s;
    }

    .leg:nth-child(2) {
      animation-delay: 1s;
    }

    @keyframes walk {
      from {
        transform: rotate(-4deg)
      }

      to {
        transform: rotate(4deg)
      }
    }

    .robot-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--rc);
      transition: color .6s;
    }
  </style>
</head>

<body>

  <div class="page">

    <!-- ── LEFT : PANEL ────────────────────────── -->
    <div class="panel">
      <header>
        <h1>FraudShield AI</h1>
        <div class="status-row">
          <div class="sdot" id="dot"></div>
          <span id="api-status">Connexion…</span>
        </div>
      </header>

      <form id="form" class="grid" onsubmit="event.preventDefault(); predict();">

        <div class="field">
          <label>Montant ($)</label>
          <input type="number" step="0.01" id="Amount" value="250.00" required>
        </div>

        <div class="field">
          <label>Date & Heure</label>
          <input type="datetime-local" id="Transaction_Date" required>
        </div>

        <div class="field full">
          <label>Catégorie Marchand</label>
          <select id="Merchant_Category">
            <option value="Retail">Commerce de détail</option>
            <option value="Online Store">Boutique en ligne</option>
            <option value="Travel">Voyages & Transport</option>
            <option value="Entertainment">Divertissement</option>
          </select>
        </div>

        <div class="field">
          <label>Distance (km)</label>
          <input type="number" step="0.1" id="Distance_From_Home" value="0.8">
        </div>

        <div class="field">
          <label>PIN Utilisé</label>
          <select id="Is_Pin_Used">
            <option value="1">Oui</option>
            <option value="0">Non</option>
          </select>
        </div>

        <!-- Hidden API fields -->
        <input type="hidden" id="Card_Type" value="Visa">
        <input type="hidden" id="Transaction_Type" value="POS">
        <input type="hidden" id="Country" value="France">
        <input type="hidden" id="Device_Type" value="Mobile">
        <input type="hidden" id="Is_International" value="0">
        <input type="hidden" id="Is_Chip" value="1">

        <div class="full">
          <div class="metal-outer" onclick="document.getElementById('form').requestSubmit()">
            <div class="metal-mid">
              <div class="metal-inner">
                <div class="shine"></div>
                <span id="btn-text">Lancer l'analyse</span>
              </div>
            </div>
          </div>
        </div>

      </form>

      <!-- Result: appears here, no scroll needed -->
      <div id="result"></div>
    </div>

    <!-- ── RIGHT : ROBOT ──────────────────────── -->
    <div class="robot-area">
      <div class="robot-wrap">
        <div class="antenna"></div>
        <div class="head" id="r-head">
          <div class="eyes">
            <div class="eye" id="r-eye1"></div>
            <div class="eye" id="r-eye2"></div>
          </div>
          <div class="mouth" id="r-mouth"></div>
        </div>
        <div class="body" id="r-body">
          <div class="arms">
            <div class="arm l" id="r-arm-l"></div>
            <div class="arm r" id="r-arm-r"></div>
          </div>
          <div class="chest" id="r-chest"></div>
          <div class="blines">
            <div class="bl" id="bl1"></div>
            <div class="bl" id="bl2"></div>
            <div class="bl" id="bl3"></div>
          </div>
        </div>
        <div class="legs">
          <div class="leg" id="r-leg1"></div>
          <div class="leg" id="r-leg2"></div>
        </div>
      </div>
      <div class="robot-label" id="robot-label">EN VEILLE</div>
    </div>

  </div>

  <script>
    // Init datetime
    const now = new Date();
    document.getElementById('Transaction_Date').value =
      new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0, 16);

    // Health check
    async function checkHealth() {
      try {
        const d = await (await fetch('/health')).json();
        document.getElementById('dot').style.cssText = 'background:var(--success);box-shadow:0 0 8px var(--success)';
        document.getElementById('api-status').innerText = `ACTIF — ${d.version || '—'}`;
      } catch {
        document.getElementById('dot').style.background = 'var(--danger)';
        document.getElementById('api-status').innerText = 'DÉCONNECTÉ';
      }
    }
    checkHealth();

    // Robot color switch
    function setRobot(state) {
      const root = document.documentElement;
      const label = document.getElementById('robot-label');
      const chest = document.getElementById('r-chest');

      const themes = {
        idle: { rc: '#6366f1', re: '#a5b4fc', rg: 'rgba(99,102,241,0.35)', label: 'EN VEILLE', lc: '#6366f1', cb: '0 0 18px #6366f1,0 0 36px #6366f1' },
        fraud: { rc: '#ef4444', re: '#fca5a5', rg: 'rgba(239,68,68,0.45)', label: '⚠ ALERTE FRAUDE', lc: '#ef4444', cb: '0 0 28px #ef4444,0 0 60px #ef4444' },
        safe: { rc: '#22c55e', re: '#86efac', rg: 'rgba(34,197,94,0.4)', label: '✔ SÉCURISÉ', lc: '#22c55e', cb: '0 0 28px #22c55e,0 0 60px #22c55e' }
      };
      const t = themes[state];
      root.style.setProperty('--rc', t.rc);
      root.style.setProperty('--re', t.re);
      root.style.setProperty('--rg', t.rg);
      label.style.color = t.lc;
      label.innerText = t.label;
      chest.style.background = t.rc;
      chest.style.boxShadow = t.cb;
    }

    // Prediction
    async function predict() {
      const btn = document.getElementById('btn-text');
      const resDiv = document.getElementById('result');
      const dateVal = document.getElementById('Transaction_Date').value;
      const amount = parseFloat(document.getElementById('Amount').value);
      const catEl = document.getElementById('Merchant_Category');
      const cat = catEl.options[catEl.selectedIndex].text;

      btn.innerText = 'ANALYSE…';
      setRobot('idle');
      resDiv.style.display = 'none';

      const payload = {
        Amount: amount,
        Transaction_Date: dateVal.replace('T', ' ') + ':00',
        Merchant_Category: catEl.value,
        Card_Type: document.getElementById('Card_Type').value,
        Transaction_Type: document.getElementById('Transaction_Type').value,
        Country: document.getElementById('Country').value,
        Device_Type: document.getElementById('Device_Type').value,
        Is_International: parseInt(document.getElementById('Is_International').value),
        Is_Chip: parseInt(document.getElementById('Is_Chip').value),
        Is_Pin_Used: parseInt(document.getElementById('Is_Pin_Used').value),
        Distance_From_Home: parseFloat(document.getElementById('Distance_From_Home').value),
        Hour_of_Day: new Date(dateVal).getHours()
      };

      try {
        const data = await (await fetch('/predict', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        })).json();

        // ── Robust fallbacks ──────────────────────
        const pred = data.prediction ?? 0;
        const proba = typeof data.probability === 'number' ? data.probability : 0;
        const msg = typeof data.message === 'string' && data.message.length > 0
          ? data.message
          : (pred === 1 ? 'Activité suspecte détectée !' : 'La transaction semble légitime.');
        const ver = data.version ?? 'N/A';
        const risk = (proba * 100).toFixed(2);
        const conf = ((1 - proba) * 100).toFixed(2);

        resDiv.style.display = 'block';

        if (pred === 1) {
          setRobot('fraud');
          resDiv.innerHTML = `
          <div class="ri fraud-th">
            <h3 style="color:var(--danger)">🚨 ${msg}</h3>
            <p>Paiement de <b>${amount.toFixed(2)} $</b> — <b>${cat}</b></p>
            <div class="score-bar" style="background:rgba(239,68,68,0.1);color:var(--danger)">
              Risque de fraude : <b>${risk} %</b>
            </div>
            <div class="meta">Modèle : ${ver}</div>
          </div>`;
        } else {
          setRobot('safe');
          resDiv.innerHTML = `
          <div class="ri safe-th">
            <h3 style="color:var(--success)">✅ ${msg}</h3>
            <p>Paiement de <b>${amount.toFixed(2)} $</b> (${cat}) validé.</p>
            <div class="score-bar" style="background:rgba(34,197,94,0.1);color:var(--success)">
              Score de confiance : <b>${conf} %</b>
            </div>
            <div class="meta">Modèle : ${ver}</div>
          </div>`;
        }

      } catch {
        resDiv.style.display = 'block';
        resDiv.innerHTML = `
        <div class="ri" style="border-color:var(--danger);background:rgba(239,68,68,0.1)">
          <h3 style="color:var(--danger)">❌ Erreur réseau</h3>
          <p>Impossible de joindre l'API.</p>
        </div>`;
      }

      btn.innerText = "LANCER L'ANALYSE";
    }
  </script>
</body>

</html>
