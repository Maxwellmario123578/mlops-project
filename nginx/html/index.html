<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FraudShield AI — Production</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.0.94/build/spline-viewer.js"></script>

  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── CARD ── */
    .card {
      position: relative;
      width: min(96vw, 1200px);
      height: min(94vh, 720px);
      background: rgba(0, 0, 0, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      overflow: hidden;
      display: flex;
      transition: border-color 0.7s, box-shadow 0.7s;
    }

    /* ── SPOTLIGHT ── */
    .spotlight {
      pointer-events: none;
      position: absolute;
      z-index: 0;
      background: radial-gradient(ellipse 60% 55% at 35% -10%,
          rgba(255, 255, 255, 0.18) 0%, rgba(255, 255, 255, 0.06) 40%, transparent 70%);
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }

    /* ── LEFT PANEL ── */
    .left {
      flex: 0 0 500px;
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px;
      border-right: 1px solid rgba(255, 255, 255, 0.05);
    }

    .left h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -1.5px;
      background: linear-gradient(to bottom, #f5f5f5 0%, #a3a3a3 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 0.8rem;
      color: #737373;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.6rem;
      font-weight: 700;
      color: #525252;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 15px;
    }

    .sdot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
    }

    /* Form with scroll if needed (but we keep it tight) */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding-right: 10px;
      mask-image: linear-gradient(to bottom, black 90%, transparent 100%);
    }

    .scroll-area::-webkit-scrollbar {
      width: 4px;
    }

    .scroll-area::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .full {
      grid-column: span 2;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field label {
      font-size: 0.58rem;
      font-weight: 700;
      color: #525252;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    input,
    select {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #e5e5e5;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-family: inherit;
      width: 100%;
      transition: border-color 0.2s;
    }

    input:focus,
    select:focus {
      border-color: rgba(255, 255, 255, 0.25);
      outline: none;
    }

    select option {
      background: #111;
    }

    /* Metal Button */
    .metal-outer {
      padding: 1.2px;
      border-radius: 10px;
      background: linear-gradient(180deg, #917100, #EAD98F);
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.6);
      transition: transform 0.2s;
    }

    .metal-outer:hover {
      transform: translateY(-2px);
    }

    .metal-outer:active {
      transform: translateY(1px);
      scale: 0.99;
    }

    .metal-mid {
      background: linear-gradient(180deg, #FFFDDD 0%, #856807 50%, #FFF1B3 100%);
      border-radius: 9px;
      padding: 1px;
    }

    .metal-inner {
      background: linear-gradient(180deg, #FFEBA1, #9B873F);
      border-radius: 8px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #FFFDE5;
      text-shadow: 0 -1px 0 rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
    }

    .shine {
      position: absolute;
      top: 0;
      left: -100%;
      width: 45%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: 0.5s;
    }

    .metal-outer:hover .shine {
      left: 160%;
    }

    /* Result */
    #result {
      margin-top: 15px;
      animation: rpop 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    @keyframes rpop {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
    }

    .ri {
      padding: 12px 15px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.02);
    }

    .ri h3 {
      font-size: 0.8rem;
      margin-bottom: 4px;
    }

    .ri p {
      font-size: 0.7rem;
      color: #737373;
      margin-bottom: 6px;
    }

    .score {
      padding: 6px 10px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 0.75rem;
    }

    .meta {
      font-size: 0.55rem;
      color: #404040;
      margin-top: 6px;
    }

    /* ── RIGHT ── */
    .right {
      flex: 1;
      position: relative;
      overflow: hidden;
      transition: filter 0.8s ease;
    }

    spline-viewer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #overlay {
      position: absolute;
      inset: 0;
      z-index: 5;
      opacity: 0;
      transition: 0.7s;
      pointer-events: none;
    }

    #watermark-fix {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 180px;
      height: 45px;
      background: #000;
      z-index: 20;
      pointer-events: none;
    }

    .loader {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .spinner {
      width: 30px;
      height: 30px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes fraudGlow {

      0%,
      100% {
        box-shadow: 0 0 0 1px rgba(239, 68, 68, 0.3), 0 0 30px rgba(239, 68, 68, 0.1);
      }

      50% {
        box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.6), 0 0 60px rgba(239, 68, 68, 0.25);
      }
    }

    @keyframes safeGlow {

      0%,
      100% {
        box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.3), 0 0 30px rgba(34, 197, 94, 0.08);
      }

      50% {
        box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.5), 0 0 50px rgba(34, 197, 94, 0.2);
      }
    }
  </style>
</head>

<body>

  <div class="card" id="card">
    <div class="spotlight" id="spotlight"></div>

    <div class="left">
      <h1>FraudShield AI</h1>
      <p class="subtitle">Analyse transactionnelle avancée alignée sur le dataset 2025.</p>

      <div class="status-row">
        <div class="sdot" id="dot"></div>
        <span id="api-status">Syncing...</span>
      </div>

      <div class="scroll-area">
        <form id="form" class="grid" onsubmit="event.preventDefault(); predict();">
          <!-- Montant -->
          <div class="field full">
            <label>Montant de la transaction ($)</label>
            <input type="number" step="0.01" id="Amount" value="45.99" required>
          </div>

          <!-- Date -->
          <div class="field">
            <label>Date & Heure</label>
            <input type="datetime-local" id="Transaction_Date" required>
          </div>

          <!-- Categorie -->
          <div class="field">
            <label>Catégorie</label>
            <select id="Merchant_Category">
              <option value="Electronics">Électronique</option>
              <option value="Fuel">Carburant</option>
              <option value="Health">Santé</option>
              <option value="Groceries">Courses</option>
              <option value="Online Services" selected>Services Web</option>
              <option value="Food">Restauration</option>
              <option value="Clothing">Vêtements</option>
              <option value="Utilities">Services Publics</option>
              <option value="Entertainment">Divertissement</option>
              <option value="Travel">Voyages</option>
            </select>
          </div>

          <!-- Card Type -->
          <div class="field">
            <label>Type de Carte</label>
            <select id="Card_Type">
              <option value="Gold">Gold</option>
              <option value="Platinum">Platinum</option>
              <option value="Debit">Debit</option>
              <option value="Credit">Credit</option>
            </select>
          </div>

          <!-- Transaction Type -->
          <div class="field">
            <label>Type de Transaction</label>
            <select id="Transaction_Type">
              <option value="POS">TPE (POS)</option>
              <option value="Online">En ligne</option>
              <option value="ATM">Retrait ATM</option>
            </select>
          </div>

          <!-- Country -->
          <div class="field">
            <label>Pays</label>
            <select id="Country">
              <option value="France">France</option>
              <option value="USA">USA</option>
              <option value="UK">UK</option>
              <option value="Canada">Canada</option>
              <option value="Germany">Allemagne</option>
              <option value="Australia">Australie</option>
              <option value="India">Inde</option>
              <option value="Singapore">Singapour</option>
            </select>
          </div>

          <!-- Device -->
          <div class="field">
            <label>Appareil</label>
            <select id="Device_Type">
              <option value="Mobile">Mobile</option>
              <option value="Web">Web</option>
              <option value="Terminal">Terminal</option>
            </select>
          </div>

          <!-- Distance -->
          <div class="field">
            <label>Distance Maison (km)</label>
            <input type="number" step="0.1" id="Distance_From_Home" value="1.5">
          </div>

          <!-- Flags -->
          <div class="field">
            <label>International ?</label>
            <select id="Is_International">
              <option value="0">Non</option>
              <option value="1">Oui</option>
            </select>
          </div>

          <div class="field">
            <label>Puce (Chip) ?</label>
            <select id="Is_Chip">
              <option value="1">Oui</option>
              <option value="0">Non</option>
            </select>
          </div>

          <div class="field">
            <label>PIN Utilisé ?</label>
            <select id="Is_Pin_Used">
              <option value="1">Oui</option>
              <option value="0">Non</option>
            </select>
          </div>

          <div class="full">
            <div class="metal-outer" onclick="document.getElementById('form').requestSubmit()">
              <div class="metal-mid">
                <div class="metal-inner">
                  <div class="shine"></div>
                  <span id="btn-text">Vérifier la transaction</span>
                </div>
              </div>
            </div>
          </div>
        </form>
      </div>

      <div id="result"></div>
    </div>

    <div class="right" id="right-container">
      <div class="loader" id="loader">
        <div class="spinner"></div>
      </div>
      <div id="overlay"></div>
      <div id="watermark-fix"></div>
      <spline-viewer id="robot" url="https://prod.spline.design/kZDDjO5HuC9GJUM2/scene.splinecode"></spline-viewer>
    </div>
  </div>

  <script>
    const n = new Date();
    document.getElementById('Transaction_Date').value = new Date(n.getTime() - n.getTimezoneOffset() * 60000).toISOString().slice(0, 16);

    document.getElementById('robot').addEventListener('load', () => { document.getElementById('loader').style.display = 'none'; });

    document.getElementById('card').addEventListener('mousemove', (e) => {
      const r = e.currentTarget.getBoundingClientRect();
      const x = ((e.clientX - r.left) / r.width * 100).toFixed(1);
      const y = ((e.clientY - r.top) / r.height * 100).toFixed(1);
      document.getElementById('spotlight').style.background = `radial-gradient(ellipse 55% 50% at ${x}% ${y}%, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.05) 40%, transparent 70%)`;
    });

    async function checkHealth() {
      try {
        const d = await (await fetch('/health')).json();
        document.getElementById('dot').style.background = '#22c55e';
        document.getElementById('api-status').innerText = `SYSTEM ONLINE — ${d.version}`;
      } catch {
        document.getElementById('api-status').innerText = 'OFFLINE';
      }
    }
    checkHealth();

    function setRobotState(state) {
      const container = document.getElementById('right-container');
      const overlay = document.getElementById('overlay');
      const card = document.getElementById('card');

      if (state === 'fraud') {
        container.style.filter = 'hue-rotate(300deg) saturate(3.5) brightness(0.8) contrast(1.2)';
        overlay.style.cssText = 'opacity:1; background: radial-gradient(circle, rgba(239,68,68,0.4) 0%, transparent 70%);';
        card.style.borderColor = '#ef4444';
        card.style.animation = 'fraudGlow 1.5s infinite';
      } else if (state === 'safe') {
        container.style.filter = 'hue-rotate(120deg) saturate(2.2) brightness(1.1)';
        overlay.style.cssText = 'opacity:1; background: radial-gradient(circle, rgba(34,197,94,0.3) 0%, transparent 70%);';
        card.style.borderColor = '#22c55e';
        card.style.animation = 'safeGlow 1.5s infinite';
      } else {
        container.style.filter = 'none';
        overlay.style.opacity = '0';
        card.style.borderColor = 'rgba(255,255,255,0.08)';
        card.style.animation = 'none';
      }
    }

    async function predict() {
      const btn = document.getElementById('btn-text');
      const resDiv = document.getElementById('result');
      const dateVal = document.getElementById('Transaction_Date').value;

      btn.innerText = 'SCANNANT...';
      resDiv.innerHTML = '';
      setRobotState('idle');

      const payload = {
        Amount: parseFloat(document.getElementById('Amount').value),
        Transaction_Date: dateVal.replace('T', ' ') + ':00',
        Merchant_Category: document.getElementById('Merchant_Category').value,
        Card_Type: document.getElementById('Card_Type').value,
        Transaction_Type: document.getElementById('Transaction_Type').value,
        Country: document.getElementById('Country').value,
        Device_Type: document.getElementById('Device_Type').value,
        Distance_From_Home: parseFloat(document.getElementById('Distance_From_Home').value),
        Is_International: parseInt(document.getElementById('Is_International').value),
        Is_Chip: parseInt(document.getElementById('Is_Chip').value),
        Is_Pin_Used: parseInt(document.getElementById('Is_Pin_Used').value),
        Hour_of_Day: new Date(dateVal).getHours()
      };

      try {
        const resp = await fetch('/predict', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await resp.json();

        const isFraud = data.prediction === 1;
        setRobotState(isFraud ? 'fraud' : 'safe');

        resDiv.innerHTML = `
        <div class="ri ${isFraud ? 'fraud-th' : 'safe-th'}">
          <h3 style="color:${isFraud ? '#ef4444' : '#22c55e'}">${isFraud ? '⚠️ FRAUDE DÉTECTÉE' : '✅ TRANSACTION SÛRE'}</h3>
          <p>${data.message || (isFraud ? 'Alerte : Modèle suspect.' : 'Transaction autorisée.')}</p>
          <div class="score" style="background:${isFraud ? 'rgba(239,68,68,0.1)' : 'rgba(34,197,94,0.1)'}; color:${isFraud ? '#f87171' : '#4ade80'}">
            ${isFraud ? 'Probabilité' : 'Confiance'} : ${(data.probability * 100).toFixed(1)}%
          </div>
        </div>
      `;
      } catch {
        resDiv.innerHTML = '<div class="ri" style="color:#ef4444">Erreur de connexion API.</div>';
      }
      btn.innerText = 'VÉRIFIER LA TRANSACTION';
    }
  </script>
</body>

</html>
