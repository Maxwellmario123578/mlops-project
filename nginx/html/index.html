<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FraudShield AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.0.94/build/spline-viewer.js"></script>

  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── CARD (reproduit le Card de shadcn/ui) ── */
    .card {
      position: relative;
      width: min(96vw, 1100px);
      height: min(92vh, 620px);
      background: rgba(0, 0, 0, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      overflow: hidden;
      display: flex;
    }

    /* ── SPOTLIGHT ── */
    .spotlight {
      pointer-events: none;
      position: absolute;
      z-index: 0;
      /* reproduit exactement l'effet Spotlight Tailwind */
      background: radial-gradient(ellipse 60% 55% at 35% -10%,
          rgba(255, 255, 255, 0.18) 0%,
          rgba(255, 255, 255, 0.06) 40%,
          transparent 70%);
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      transition: opacity 0.6s ease;
    }

    /* ── LEFT PANEL ── */
    .left {
      flex: 0 0 48%;
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 52px 48px;
      gap: 0;
    }

    .left h1 {
      font-size: clamp(1.9rem, 3vw, 2.8rem);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -1.5px;
      background: linear-gradient(to bottom, #f5f5f5 0%, #a3a3a3 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 0.88rem;
      color: #a3a3a3;
      line-height: 1.6;
      margin-bottom: 28px;
      max-width: 320px;
    }

    /* Status badge */
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.68rem;
      font-weight: 700;
      color: #525252;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 22px;
    }

    .sdot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
      transition: background 0.5s, box-shadow 0.5s;
    }

    /* Form grid */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .full {
      grid-column: span 2;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field label {
      font-size: 0.62rem;
      font-weight: 700;
      color: #525252;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    input,
    select {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #e5e5e5;
      padding: 9px 12px;
      border-radius: 10px;
      font-size: 0.84rem;
      font-family: inherit;
      width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus,
    select:focus {
      border-color: rgba(255, 255, 255, 0.3);
      outline: none;
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.06);
    }

    select option {
      background: #111;
    }

    /* Metal Button — Gold */
    .metal-outer {
      margin-top: 14px;
      padding: 1.5px;
      border-radius: 12px;
      background: linear-gradient(180deg, #917100, #EAD98F);
      cursor: pointer;
      box-shadow: 0 5px 18px rgba(0, 0, 0, 0.7);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .metal-outer:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.6);
    }

    .metal-outer:active {
      transform: translateY(1px);
      scale: 0.99;
    }

    .metal-mid {
      background: linear-gradient(180deg, #FFFDDD 0%, #856807 50%, #FFF1B3 100%);
      border-radius: 11px;
      padding: 1px;
    }

    .metal-inner {
      background: linear-gradient(180deg, #FFEBA1, #9B873F);
      border-radius: 10px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #FFFDE5;
      text-shadow: 0 -1px 0 rgba(0, 0, 0, 0.4);
      position: relative;
      overflow: hidden;
    }

    .shine {
      position: absolute;
      top: 0;
      left: -100%;
      width: 45%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: 0.55s;
    }

    .metal-outer:hover .shine {
      left: 160%;
    }

    /* Result block */
    #result {
      margin-top: 12px;
      display: none;
      animation: rpop 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      border-radius: 14px;
      overflow: hidden;
    }

    @keyframes rpop {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
    }

    .ri {
      padding: 13px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .ri h3 {
      font-size: 0.85rem;
      margin-bottom: 5px;
    }

    .ri p {
      font-size: 0.74rem;
      color: #737373;
      margin-bottom: 8px;
    }

    .score {
      padding: 8px 12px;
      border-radius: 9px;
      font-weight: 700;
      font-size: 0.82rem;
    }

    .meta {
      font-size: 0.6rem;
      color: #404040;
      margin-top: 8px;
    }

    .fraud-th {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.35);
    }

    .safe-th {
      background: rgba(34, 197, 94, 0.1);
      border-color: rgba(34, 197, 94, 0.35);
    }

    /* ── RIGHT : Spline ── */
    .right {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* Spline viewer prend tout l'espace */
    spline-viewer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* Overlay de couleur pour fraud/safe (par-dessus Spline) */
    #spline-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.8s ease, background 0.8s ease;
      border-radius: 0;
      mix-blend-mode: color;
    }

    /* Spinner fallback pendant chargement Spline */
    .loader {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 0;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <!-- ── CARD ────────────────────────────────────── -->
  <div class="card">

    <!-- Spotlight -->
    <div class="spotlight" id="spotlight"></div>

    <!-- LEFT -->
    <div class="left">
      <h1>FraudShield AI</h1>
      <p class="subtitle">
        Détection de fraude bancaire en temps réel, propulsée par XGBoost et une IA de dernière génération.
      </p>

      <div class="status-row">
        <div class="sdot" id="dot"></div>
        <span id="api-status">Connexion…</span>
      </div>

      <form id="form" class="grid" onsubmit="event.preventDefault(); predict();">

        <div class="field">
          <label>Montant ($)</label>
          <input type="number" step="0.01" id="Amount" value="250.00" required>
        </div>

        <div class="field">
          <label>Date & Heure</label>
          <input type="datetime-local" id="Transaction_Date" required>
        </div>

        <div class="field full">
          <label>Catégorie Marchand</label>
          <select id="Merchant_Category">
            <option value="Retail">Commerce de détail</option>
            <option value="Online Store">Boutique en ligne</option>
            <option value="Travel">Voyages & Transport</option>
            <option value="Entertainment">Divertissement</option>
          </select>
        </div>

        <div class="field">
          <label>Distance (km)</label>
          <input type="number" step="0.1" id="Distance_From_Home" value="0.8">
        </div>

        <div class="field">
          <label>PIN Utilisé</label>
          <select id="Is_Pin_Used">
            <option value="1">Oui</option>
            <option value="0">Non</option>
          </select>
        </div>

        <!-- Hidden API fields -->
        <input type="hidden" id="Card_Type" value="Visa">
        <input type="hidden" id="Transaction_Type" value="POS">
        <input type="hidden" id="Country" value="France">
        <input type="hidden" id="Device_Type" value="Mobile">
        <input type="hidden" id="Is_International" value="0">
        <input type="hidden" id="Is_Chip" value="1">

        <div class="full">
          <div class="metal-outer" onclick="document.getElementById('form').requestSubmit()">
            <div class="metal-mid">
              <div class="metal-inner">
                <div class="shine"></div>
                <span id="btn-text">Lancer l'analyse</span>
              </div>
            </div>
          </div>
        </div>

      </form>

      <div id="result"></div>
    </div>

    <!-- RIGHT : Spline scene -->
    <div class="right">
      <div class="loader" id="loader">
        <div class="spinner"></div>
      </div>

      <!-- Overlay coloré qui teintera le robot -->
      <div id="spline-overlay"></div>

      <spline-viewer id="robot" url="https://prod.spline.design/kZDDjO5HuC9GJUM2/scene.splinecode"
        style="position:absolute;inset:0;width:100%;height:100%;" loading="eager"></spline-viewer>
    </div>

  </div>

  <script>
    // Init datetime
    const n = new Date();
    document.getElementById('Transaction_Date').value =
      new Date(n.getTime() - n.getTimezoneOffset() * 60000).toISOString().slice(0, 16);

    // Cacher le loader quand Spline est prêt
    document.getElementById('robot').addEventListener('load', () => {
      document.getElementById('loader').style.display = 'none';
    });

    // Spotlight suit la souris
    document.querySelector('.card').addEventListener('mousemove', (e) => {
      const rect = e.currentTarget.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
      const y = ((e.clientY - rect.top) / rect.height * 100).toFixed(1);
      document.getElementById('spotlight').style.background =
        `radial-gradient(ellipse 55% 50% at ${x}% ${y}%, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 45%, transparent 70%)`;
    });

    // Health check
    async function checkHealth() {
      try {
        const d = await (await fetch('/health')).json();
        document.getElementById('dot').style.cssText = 'background:#22c55e;box-shadow:0 0 8px #22c55e';
        document.getElementById('api-status').innerText = `ACTIF — ${d.version || '—'}`;
      } catch {
        document.getElementById('dot').style.cssText = 'background:#ef4444;box-shadow:0 0 8px #ef4444';
        document.getElementById('api-status').innerText = 'DÉCONNECTÉ';
      }
    }
    checkHealth();

    // Robot reaction via overlay + CSS filter
    function setRobotState(state) {
      const overlay = document.getElementById('spline-overlay');
      const robot = document.getElementById('robot');

      if (state === 'fraud') {
        // Filtre rouge intense
        robot.style.filter = 'hue-rotate(300deg) saturate(3) brightness(0.9)';
        overlay.style.background = 'rgba(239,68,68,0.15)';
        overlay.style.opacity = '1';
      } else if (state === 'safe') {
        // Filtre vert
        robot.style.filter = 'hue-rotate(100deg) saturate(2) brightness(1.05)';
        overlay.style.background = 'rgba(34,197,94,0.12)';
        overlay.style.opacity = '1';
      } else {
        // Reset
        robot.style.filter = 'none';
        overlay.style.opacity = '0';
      }
    }

    // Predict
    async function predict() {
      const btn = document.getElementById('btn-text');
      const resDiv = document.getElementById('result');
      const dateVal = document.getElementById('Transaction_Date').value;
      const amount = parseFloat(document.getElementById('Amount').value);
      const catEl = document.getElementById('Merchant_Category');
      const cat = catEl.options[catEl.selectedIndex].text;

      btn.innerText = 'ANALYSE…';
      setRobotState('idle');
      resDiv.style.display = 'none';

      const payload = {
        Amount: amount,
        Transaction_Date: dateVal.replace('T', ' ') + ':00',
        Merchant_Category: catEl.value,
        Card_Type: document.getElementById('Card_Type').value,
        Transaction_Type: document.getElementById('Transaction_Type').value,
        Country: document.getElementById('Country').value,
        Device_Type: document.getElementById('Device_Type').value,
        Is_International: parseInt(document.getElementById('Is_International').value),
        Is_Chip: parseInt(document.getElementById('Is_Chip').value),
        Is_Pin_Used: parseInt(document.getElementById('Is_Pin_Used').value),
        Distance_From_Home: parseFloat(document.getElementById('Distance_From_Home').value),
        Hour_of_Day: new Date(dateVal).getHours()
      };

      try {
        const data = await (await fetch('/predict', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        })).json();

        const pred = data.prediction ?? 0;
        const proba = typeof data.probability === 'number' ? data.probability : 0;
        const msg = (typeof data.message === 'string' && data.message.trim().length > 0)
          ? data.message
          : (pred === 1 ? 'Activité suspecte détectée !' : 'La transaction semble légitime.');
        const ver = data.version ?? 'N/A';
        const risk = (proba * 100).toFixed(2);
        const conf = ((1 - proba) * 100).toFixed(2);

        resDiv.style.display = 'block';

        if (pred === 1) {
          setRobotState('fraud');
          resDiv.innerHTML = `
            <div class="ri fraud-th">
              <h3 style="color:#ef4444">🚨 ${msg}</h3>
              <p>Paiement de <b>${amount.toFixed(2)} $</b> — <b>${cat}</b></p>
              <div class="score" style="background:rgba(239,68,68,0.1);color:#ef4444">
                Risque de fraude : <b>${risk} %</b>
              </div>
              <div class="meta">Modèle : ${ver}</div>
            </div>`;
        } else {
          setRobotState('safe');
          resDiv.innerHTML = `
            <div class="ri safe-th">
              <h3 style="color:#22c55e">✅ ${msg}</h3>
              <p>Paiement de <b>${amount.toFixed(2)} $</b> (${cat}) validé.</p>
              <div class="score" style="background:rgba(34,197,94,0.1);color:#22c55e">
                Score de confiance : <b>${conf} %</b>
              </div>
              <div class="meta">Modèle : ${ver}</div>
            </div>`;
        }

      } catch {
        resDiv.style.display = 'block';
        resDiv.innerHTML = `
          <div class="ri" style="border-color:rgba(239,68,68,0.4);background:rgba(239,68,68,0.08)">
            <h3 style="color:#ef4444">❌ Erreur réseau</h3>
            <p>Impossible de joindre l'API d'analyse.</p>
          </div>`;
      }

      btn.innerText = "LANCER L'ANALYSE";
    }
  </script>
</body>

</html>
